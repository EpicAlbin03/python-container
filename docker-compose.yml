services:
  web:
    container_name: django-web
    # Build the image from the Dockerfile in the current directory
    build: .
    # Production uses Gunicorn WSGI server (use daphne when using ASGI).
    command: sh -c "uv run gunicorn core.wsgi --bind 0.0.0.0:8000"
    restart: always
    # Host the Django application on port 8000
    ports:
      - "8000:8000"
    environment:
      # Include development dependencies when working locally
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-myuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password123}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    # Run as root during development so the environment is mutable
    # Alternatively, you could set `UV_PROJECT_ENVIRONMENT` to a path owned by the non-root user
    user: root
    depends_on:
      - postgres
        # condition: service_healthy
    # healthcheck:
    #   test:
    #     [
    #       "CMD",
    #       "python",
    #       "-c",
    #       "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/', timeout=3).status < 500 else 1)",
    #     ]
    #   interval: 5s
    #   timeout: 5s
    #   retries: 10

  postgres:
    image: postgres:18
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-myuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password123}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - db-data:/var/lib/postgresql/data/pgdata
    # healthcheck:
    #   test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
    #   interval: 5s
    #   timeout: 5s
    #   retries: 10

volumes:
  db-data:
