{% extends 'base.html' %} {% block title %}Home{% endblock %} {% block content %}
<div class="max-w-2xl space-y-4">
  <h1 class="text-3xl font-bold tracking-tight">Welcome!</h1>
  <p class="text-muted-foreground text-lg">Manage your students and courses.</p>
  <c-separator class="my-4" />
  <div class="flex gap-3">
    <a
      href="{% url 'student_list' %}"
      class="inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors h-9 px-4 py-2 bg-primary text-primary-foreground shadow-sm hover:bg-primary/90"
    >
      View Students
    </a>
    <a
      href="{% url 'course_list' %}"
      class="inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors h-9 px-4 py-2 border border-input bg-background shadow-xs hover:bg-accent hover:text-accent-foreground"
    >
      View Courses
    </a>
  </div>
</div>
{% endblock %}
